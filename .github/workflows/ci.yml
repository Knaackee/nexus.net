name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          8.0.x
          10.0.x

    - name: Restore dependencies
      run: dotnet restore Nexus.sln

    - name: Build
      run: dotnet build Nexus.sln --no-restore --configuration Release

    - name: Test
      shell: pwsh
      run: |
        $testProjects = Get-ChildItem tests -Recurse -Filter *.csproj |
          Where-Object { $_.Name -notin @('Nexus.Cli.Tests.csproj', 'Nexus.Live.Integration.Tests.csproj') } |
          Sort-Object FullName

        foreach ($project in $testProjects) {
          dotnet test $project.FullName --no-build --configuration Release --verbosity normal --logger "trx;LogFileName=$($project.BaseName).trx" --collect:"XPlat Code Coverage" --results-directory TestResults
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }
        }

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: |
          **/TestResults/*.trx
          **/TestResults/**/coverage.cobertura.xml
